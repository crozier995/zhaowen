name: 朝闻每日更新

on:
  schedule:
    # 每天北京时间 07:47（UTC 23:47）
    - cron: '47 23 * * *'
  workflow_dispatch:   # 允许在 GitHub 网页上手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 抓取今日新闻与热搜
        run: python update.py

      - name: 生成 Kimi 点评（配置了 MOONSHOT_API_KEY 才生效）
        env:
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
        run: python comment_gen.py

      - name: 提交并推送上线
        run: |
          git config user.name "zhaowen-bot"
          git config user.email "zhaowen-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "每日更新 $(date +%F)"
          git push
